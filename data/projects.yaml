# 项目注册配置
# 每个项目需要：
#   name: 短标识符（用于路由匹配）
#   path: 项目根目录的绝对路径
#   description: 项目描述（给 orchestrator 判断路由用）
#
# 项目目录下如果有 .claude/agents/*.md 或 .claude/skills/*/SKILL.md，会被加载为该项目的 skills

projects:
  - name: work-agent-os
    path: D:/standard/work-agent-os
    description: >
      个人工作助手系统（work-agent-os）。Python 3.11 + FastAPI + Claude Agent SDK + React。
      通过飞书接收消息，两级 Agent 架构（主 Agent + 项目 Agent）。

  - name: allspark
    path: D:/standard/riot/allspark
    description: >
      Riot 调度系统 3.0（allspark）后端/调度核心。别名：riot3、RIOT3、riot3调度系统。
      版本线索：3.x、v3.x、RIOT3.0。
      Java 11 + Spring Boot 2.7.6 + Gradle + TDengine。
      多机器人调度与控制系统：AGV 路径规划（TDSPP/A*）、死锁解决、行为树任务编排、
      设备管理（充电桩/电梯/风淋门，Modbus/S7/HTTP/SocketIO）、RBAC + JWT 安全层。
      若用户明确提到 RIOT3 前端、frontend、页面/UI/Web 控制台，请优先路由到 riot-frontend-v3。
      模块：apps/ packages/ plugins/ src/ frontend/ ai/。

  - name: riot-frontend-v3
    path: D:/standard/riot/riot-frontend-v3
    description: >
      RIOT3 前端项目（riot-frontend-v3）。别名：riot3前端、riot3 前端、RIOT3前端、RIOT3 前端、riot3 frontend、riot3-frontend、allspark frontend。
      关键词线索：前端、frontend、Web UI、页面、控制台、Vue 3、Vite、Pinia。
      Riot 3.0 Web 控制台与前端工作台，处理页面/UI/交互/前端构建相关问题。
      技术栈：Vue 3 + TypeScript + Vite + Pinia + Vue Router + UnoCSS。

  - name: riot-standalone
    path: D:/standard/riot/riot-standalone
    description: >
      Riot 2.0 单体版（riot-standalone）。别名：riot2、RIOT2。
      版本线索：2.x、v2.x、RIOT2.0。
      Java 11 + Spring Boot + Maven 多模块。
      前代车队调度系统，模块：bootstrap/device/task/fcs（Fleet Control System）/
      brokerx/security。使用 Flyway 数据库迁移，sprint/release/master 分支流程。

  - name: fms-java
    path: D:/standard/riot/fms-java
    description: >
      Riot 1.0 车队管理系统（fms-java）。别名：riot1、RIOT1、fms、车队管理系统。
      版本线索：4.x、v4.x、FMS/RIoT版本 4.x。
      Java + Gradle 多模块项目。
      车队管理/FMS 系统，包含 fms、service、common、configuration、api-base、
      fms_frontend 与多个 extension 模块（tcp/rmi/dhcp/statistics/accessory）。

  - name: allsparkbox
    path: D:/standard/riot/allsparkbox
    description: >
      RIOT3 部署构建包（allsparkbox）。别名：部署包、安装包。
      关键词线索：docker、podman、镜像、部署、supervisord、安装。
      Docker/Podman 一键安装方案。
      涵盖：镜像构建流程（Makefile + Dockerfile）、分层镜像依赖链（base→mysql→taos→grafana→
      mosquitto→admin→allspark→mip→set→middler）、Linux/Windows 部署方法、
      端口配置、数据卷挂载、supervisord 服务管理、中控部署、Podman 适配。
      关键文件：RIOT3部署文档.md（完整部署手册）、README.md（构建指南）、images/（镜像构建脚本）。

  - name: claude-code-sourcemap
    path: D:/standard/claude-code-sourcemap
    description: >
      Claude Code 源码学习4项目。用于 Claude Code 源码阅读、行为分析、调用链追踪与实现细节研究。
      重点关注 CLI/Agent Runtime/工具调用/会话恢复/流式事件与相关调试验证。
