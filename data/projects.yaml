# 项目注册配置
# 每个项目需要：
#   name: 短标识符（用于路由匹配）
#   path: 项目根目录的绝对路径
#   description: 项目描述（给 orchestrator 判断路由用）
#
# 项目目录下如果有 .claude/agents/*.md，会被加载为该项目的 skills

projects:
  - name: work-agent-os
    path: D:/standard/work-agent-os
    description: >
      个人工作助手系统。Python 3.11 + FastAPI + Claude Agent SDK + React。
      通过飞书接收消息，Orchestrator Agent 自主决策处理。
      有 5 个 skill agent（intake/context/analysis/reply/report）。

  - name: allspark
    path: D:/standard/riot/allspark
    description: >
      Riot 调度系统 3.0（allspark）。Java 11 + Spring Boot 2.7.6 + Gradle + TDengine。
      多机器人调度与控制系统：AGV 路径规划（TDSPP/A*）、死锁解决、行为树任务编排、
      设备管理（充电桩/电梯/风淋门，Modbus/S7/HTTP/SocketIO）、RBAC + JWT 安全层。
      模块：apps/ packages/ plugins/ src/ frontend/ ai/。

  - name: riot-standalone
    path: D:/standard/riot/riot-standalone
    description: >
      Riot 2.0 单体版。Java 11 + Spring Boot + Maven 多模块。
      前代车队调度系统，模块：bootstrap/device/task/fcs（Fleet Control System）/
      brokerx/security。使用 Flyway 数据库迁移，sprint/release/master 分支流程。
