interface:
  display_name: "RIOT Log Triage"
  short_description: "分析 RIOT1/2/3 日志、现场问题与补料回合"
  default_prompt: "请用这个技能以多轮排障方式分析一条 RIOT 项目的日志/现场问题：先检查日志包、导出规则、时间口径和文件路由，再判断是否属于订单/车辆任务执行链路；只要涉及下单、派单、任务下发、车辆执行、取消、完成、卡死或状态流转异常，都默认按订单/车辆任务执行问题处理。缺订单号时先做首轮探索，用车辆名称 + 时间窗 + 业务门禁词找 order_candidates、状态候选和流程门禁；拿到订单候选后再进入验证轮，按 订单ID -> 车辆名称 -> 时间 + 门禁/代码关键词 收紧，没有闭合不要给高置信。对订单/车辆问题，先建立 partial 的问题时间点快照，再通过日志和代码补齐车辆状态、流程门禁、理论下一步和实际阻塞点；区分主因、触发条件、伴随现象和干扰项。RIOT3/allspark 日志原始时区是 UTC+0，需要换算到项目所在地时区（国内 UTC+8，其他项目按当地时区），RIOT2/FMS 以服务器时间为准。大规模日志搜索优先使用 search_worker.py 或宿主系统允许的批量搜索执行器，主线程只保留每轮 focus question、关键证据、关键代码、置信度和最小补料问题；等我确认后再出正式报告。"
