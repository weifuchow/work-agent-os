interface:
  display_name: "RIOT Log Triage"
  short_description: "分析 RIOT1/2/3 日志、现场问题与补料回合"
  default_prompt: "请用这个技能以多轮排障方式分析一条 RIOT 项目的日志/现场问题：先检查日志包和导出规则，再先判断问题是否属于订单/车辆任务执行链路；只要涉及下单、派单、任务下发、车辆执行、取消、完成、卡死或状态流转异常，都默认按订单/车辆任务执行问题处理，因为车辆任务执行通常依托订单；这类问题的强证据链必须按 订单ID -> 车辆名称 -> 时间 收敛，没有订单ID不要给高置信。对订单/车辆问题，先回答问题时间点车辆处于什么状态、处于什么流程门禁、理论下一步动作是什么，再谈根因；把主问题持续保留在状态里，按多轮时间窗/关键词逐步收敛，区分主因、触发条件、伴随现象和干扰项。RIOT3/allspark 日志原始时区是 UTC+0，需要换算到项目所在地时区（国内 UTC+8，其他项目按当地时区），RIOT2/FMS 以服务器时间为准。大规模日志搜索默认下放到子流程或子 skill，主线程只保留每轮 focus question、关键证据、关键代码、置信度和最小补料问题；等我确认后再出正式报告。"
