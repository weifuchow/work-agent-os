interface:
  display_name: "RIOT Log Triage"
  short_description: "分析 RIOT1/2/3 日志、现场问题与补料回合"
  default_prompt: "请用这个技能以多轮排障方式分析一条 RIOT 项目的日志/现场问题：先检查日志包和导出规则，再先判断问题是否属于订单/车辆任务执行链路；只要涉及下单、派单、任务下发、车辆执行、取消、完成、卡死或状态流转异常，都默认按订单/车辆任务执行问题处理，因为车辆任务执行通常依托订单；这类问题的强证据链必须按 订单ID -> 车辆名称 -> 时间 收敛，没有订单ID不要给高置信；只有明确不是订单链路的问题，才可以不强求订单ID；RIOT3/allspark 日志原始时区是 UTC+0，需要换算到项目所在地时区（国内 UTC+8，其他项目按当地时区），RIOT2/FMS 以服务器时间为准；如果输出表格，默认增加 `日志原文`、`日志文件`、`匹配关键词` 三列，分别展示精选日志原文、来源文件路径和命中的关键词；如有必要再补 `匹配说明` 解释时间窗或目标文件命中依据；大规模搜索下放到子流程；先给阶段性结论、置信度和最小补料问题，等我确认后再出正式报告。"
